<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamming Detection | Admin Login</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .title-text {
            font-weight: 700;
            line-height: 1.3;
            color: #1e2937;
        }
        
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            outline: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .header-title {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header-title">
        <div class="container">
            <h1 class="title-text mb-0">
                 Jamming Detection and Forecasting Model<br>
                <small class="fs-5 fw-normal opacity-90">
                    Using Transport and Application Layer Parameters in Wi-Fi Based IoT Systems
                </small>
            </h1>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 col-sm-10">
                
                <!-- Login Card -->
                <div class="login-card p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
                        <h3 class="fw-bold text-dark">Admin Login</h3>
                        <p class="text-muted">Enter your credentials to access the dashboard</p>
                    </div>

                    <!-- Error/Success Message -->
                    {% if msg %}
                    <div class="alert alert-danger alert-dismissible fade show text-center" role="alert">
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}

                    <form name="f1" id="loginForm" method="post" action="/AdminLoginAction">
                        

                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark">
                                <i class="fas fa-user me-2"></i> Username
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   name="t1" 
                                   id="username"
                                   placeholder="Enter username"
                                   autocomplete="username"
                                   required>
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark">
                                <i class="fas fa-lock me-2"></i> Password
                            </label>
                            <div class="input-group">
                                <input type="password" 
                                       class="form-control" 
                                       name="t2" 
                                       id="password"
                                       placeholder="Enter password"
                                       autocomplete="current-password"
                                       required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fas fa-eye" id="eyeIcon"></i>
                                </button>
                            </div>
                            <div id="passwordError" class="invalid-feedback"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg btn-login">
                                <i class="fas fa-sign-in-alt me-2"></i> Login
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <small class="text-muted">Secure Admin Access • LSTM IoT Security System</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS + Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordField = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // Enhanced form validation
        const form = document.getElementById('loginForm');
        
        form.addEventListener('submit', function(e) {
            let isValid = true;
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            const usernameError = document.getElementById('usernameError');
            const passwordError = document.getElementById('passwordError');
            
            // Reset errors
            usernameError.textContent = '';
            passwordError.textContent = '';
            
            if (username === '') {
                usernameError.textContent = 'Username is required';
                isValid = false;
            }
            
            if (password === '') {
                passwordError.textContent = 'Password is required';
                isValid = false;
            }
            
            if (!isValid) {
                e.preventDefault();
            }
        });

        // Auto focus username field
        window.onload = function() {
            document.getElementById('username').focus();
        };
    </script>
</body>
</html>
